<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beige Book Tracker</title>
<link href="https://fonts.cdnfonts.com/css/aller" rel="stylesheet">
<style>
  /* Forzar Aller Bold en headers */
  thead th {
    font-family: 'Aller', sans-serif !important;
    font-weight: bold !important;
    font-synthesis: none;
  }
  .header-title {
    font-family: 'Aller', sans-serif !important;
    font-weight: bold !important;
  }
</style>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f8f2;
    --surface2: #edf3e6;
    --border: #dde8d4;
    --border2: #c8d9b8;
    --text: #1b2127;
    --text-muted: #5d7082;
    --text-dim: #b5c1cb;
    --accent: #7bc143;
    --accent2: #475765;

    /* pos = verde MFO */
    --pos: #3d6e1a;
    --pos-bg: #e1f1d3;
    --pos-border: #b3d88c;

    /* neg = naranja MFO (señal de alerta/caída) */
    --neg: #a8411a;
    --neg-bg: #fce9e2;
    --neg-border: #e07f5c;

    /* flat = gris-azul MFO (tablas) */
    --flat: #3d5060;
    --flat-bg: #eaeff3;
    --flat-border: #b5c1cb;

    /* hot = naranja oscuro MFO */
    --hot: #8a3010;
    --hot-bg: #fde0d4;
    --hot-border: #e07f5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Aller Light', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; }
  .header-updated {
    font-family: 'Aller Light', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }
  .header-updated strong {
    font-weight: 700;
    color: var(--text-muted);
  }
  .header-eyebrow {
    font-family: 'Aller', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header-title {
    font-family: 'Aller', sans-serif !important;
    font-size: 22px;
    font-weight: 700 !important;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .header-public {
    font-family: 'Aller', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #1a9fcc;
  }
  .legend {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* WRAPPER */
  .table-wrapper {
    overflow-x: auto;
    padding: 24px 32px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--flat-border) transparent;
  }
  .table-wrapper::-webkit-scrollbar {
    height: 6px;
  }
  .table-wrapper::-webkit-scrollbar-track {
    background: transparent;
  }
  .table-wrapper::-webkit-scrollbar-thumb {
    background: var(--flat-border);
    border-radius: 99px;
  }
  .table-wrapper::-webkit-scrollbar-thumb:hover {
    background: var(--flat);
  }

  /* TABLE */
  table {
    border-collapse: collapse;
    width: auto;
  }
  thead th {
    font-family: 'Aller', sans-serif !important;
    font-size: 15px;
    font-weight: 700 !important;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text);
    padding: 0 8px 14px;
    text-align: center;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  thead th.topic-header {
    text-align: left;
    padding-left: 0;
    min-width: 200px;
    position: sticky;
    left: 0;
    z-index: 3;
    background: var(--bg);
  }
  thead th, thead th.latest {
    font-family: 'Aller', sans-serif !important;
    font-weight: 700 !important;
    -webkit-font-smoothing: antialiased;
  }
  thead th.month-header {
    width: 190px;
    min-width: 190px;
    max-width: 190px;
  }
  /* Highlight latest column */
  thead th.latest {
    color: var(--text);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: #f5f8f2; }
  tbody tr:last-child { border-bottom: none; }

  .topic-cell {
    padding: 8px 16px 8px 0;
    white-space: nowrap;
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--bg);
  }
  tbody tr:hover .topic-cell {
    background: #f5f8f2;
  }
  .topic-icon {
    display: inline-block;
    margin-right: 8px;
    font-size: 14px;
    vertical-align: middle;
  }
  .topic-name {
    font-family: 'Aller', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    vertical-align: middle;
  }

  .data-cell {
    padding: 6px 8px;
    text-align: center;
    vertical-align: middle;
    width: 190px;
    min-width: 190px;
    max-width: 190px;
  }

  /* BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    width: 155px;
    text-decoration: none;
    white-space: nowrap;
  }
  .badge:hover {
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(0,0,0,0.12);
  }
  .badge-icon {
    display: none;
  }
  .badge-label {
    font-family: 'Aller Light', sans-serif;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
  }

  .badge.pos { background: var(--pos-bg); border-color: var(--pos-border); color: var(--pos); }
  .badge.neg { background: var(--neg-bg); border-color: var(--neg-border); color: var(--neg); }
  .badge.flat { background: var(--flat-bg); border-color: var(--flat-border); color: var(--flat); }
  .badge.hot { background: var(--hot-bg); border-color: var(--hot-border); color: var(--hot); }

  .empty-cell {
    display: inline-block;
    width: 80px;
    height: 36px;
    border-radius: 5px;
    background: var(--surface);
    border: 1px dashed var(--border2);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,7,12,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    width: 620px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    animation: modal-in 0.18s ease;
  }
  @keyframes modal-in {
    from { opacity:0; transform: scale(0.96) translateY(6px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .modal-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .modal-period {
    font-family: 'Aller', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .modal-topic {
    font-family: 'Aller', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .modal-badge-wrap { flex-shrink: 0; }
  .modal-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-family: 'Aller Light', sans-serif;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid transparent;
  }
  .modal-badge.pos { background: var(--pos-bg); border-color: var(--pos-border); color: var(--pos); }
  .modal-badge.neg { background: var(--neg-bg); border-color: var(--neg-border); color: var(--neg); }
  .modal-badge.flat { background: var(--flat-bg); border-color: var(--flat-border); color: var(--flat); }
  .modal-badge.hot { background: var(--hot-bg); border-color: var(--hot-border); color: var(--hot); }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
    margin-left: 8px;
    flex-shrink: 0;
    transition: color 0.1s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body {
    padding: 18px 22px 22px;
  }
  .modal-bullets {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .modal-bullets li {
    font-family: 'Aller Light', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    padding-left: 18px;
    position: relative;
  }
  .modal-bullets li::before {
    content: '▶';
    color: #b5c1cb;
    font-size: 11px;
    position: absolute;
    left: 0;
    top: 3px;
  }

  .modal-bullets li strong {
    font-weight: 700;
    color: var(--text);
  }
  .empty-state {
    padding: 60px 32px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .empty-state-sub { font-size: 12px; color: var(--text-dim); }

  /* FULL TEXT MODAL */
  .fulltext-modal { width: 780px; }
  .fulltext-body {
    padding: 22px 26px 28px;
    font-family: 'Aller Light', sans-serif;
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text);
  }
  .fulltext-body h3 {
    font-family: 'Aller', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
  }
  .fulltext-body h4 {
    font-family: 'Aller', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 20px;
    margin-bottom: 8px;
  }
  .fulltext-body p { margin-bottom: 12px; }
  .fulltext-body strong {
    font-family: 'Aller', sans-serif;
    font-weight: 700;
    color: var(--text);
  }
  thead th.month-header:hover {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Beige Book Tracker</span>
    <span class="header-updated">Last updated: <strong id="lastUpdated">loading...</strong></span>
  </div>
  <div class="header-right">
    <span class="header-public">Información Pública</span>
  </div>
</div>

<div class="table-wrapper" id="tableWrapper"></div>

<!-- Full Text Modal -->
<div class="modal-overlay" id="fullTextOverlay" onclick="closeFullText(event)">
  <div class="modal fulltext-modal" id="fullTextModal">
    <div class="modal-header">
      <div class="modal-meta">
        <span class="modal-topic" id="fullTextPeriod"></span>
      </div>
      <button class="modal-close" onclick="document.getElementById('fullTextOverlay').classList.remove('active')">✕</button>
    </div>
    <div class="modal-body fulltext-body" id="fullTextBody"></div>
  </div>
</div>

<!-- Topic Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-meta">
        <span class="modal-period" id="modalPeriod"></span>
        <span class="modal-topic" id="modalTopic"></span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="modal-badge-wrap"><span class="modal-badge" id="modalBadge"></span></div>
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <ul class="modal-bullets" id="modalBullets"></ul>
    </div>
  </div>
</div>

  'feb2026': {

    fullText: `<h4>Overall Economic Activity</h4>

  'may2026': {

// ─── TAG NORMALIZATION ───────────────────────────────────────────
// Regla: si el status de un tema NO cambia entre meses consecutivos,
// el tag se hereda del mes anterior (para mantener consistencia visual).
// Si el status SÍ cambia, el tag del nuevo mes se respeta tal cual.
// El status NUNCA se modifica — solo el tag.
function normalizeTags() {
  TOPICS.forEach(topic => {
    for (let i = 1; i < MONTHS.length; i++) {
      const prevMonth = MONTHS[i - 1];
      const currMonth = MONTHS[i];
      const prev = DATA[prevMonth]?.[topic.id];
      const curr = DATA[currMonth]?.[topic.id];
      if (!prev || !curr) continue;
      if (curr.status === prev.status) {
        // mismo status → heredar tag
        curr.tag = prev.tag;
      }
      // distinto status → respetar tag y status del mes actual, sin tocar nada
    }
  });
}
normalizeTags();

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
  const wrapper = document.getElementById('tableWrapper');

  if (MONTHS.length === 0) {
    wrapper.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📄</div>
        <div class="empty-state-title">No data yet</div>
        <div class="empty-state-sub">Attach the first Beige Book PDF to start tracking</div>
      </div>`;
    return;
  }

  let html = '<table><thead><tr>';
  html += '<th class="topic-header">Topic</th>';
  MONTHS.forEach((m, i) => {
    const isLatest = i === 0;
    html += `<th class="month-header${isLatest ? ' latest' : ''}" onclick="openFullText('${m}')" style="cursor:pointer;" title="Click to read full Beige Book">${DATA[m].label}</th>`;
  });
  html += '</tr></thead><tbody>';

  TOPICS.forEach(topic => {
    html += '<tr>';
    html += `<td class="topic-cell"><span class="topic-name">${topic.name}</span></td>`;
    MONTHS.forEach(m => {
      const cell = DATA[m][topic.id];
      if (!cell) {
        html += `<td class="data-cell"><span class="empty-cell"></span></td>`;
      } else {
        const s = STATUS[cell.status] || STATUS.flat;
        html += `<td class="data-cell">
          <span class="badge ${cell.status}" onclick="openModal('${m}','${topic.id}')">
            <span class="badge-icon">${s.icon}</span>
            <span class="badge-label">${escHtml(cell.tag)}</span>
          </span>
        </td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrapper.innerHTML = html;
}

// ─── FULL TEXT MODAL ─────────────────────────────────────────────
function openFullText(monthKey) {
  const month = DATA[monthKey];
  document.getElementById('fullTextPeriod').textContent = month.label;
  document.getElementById('fullTextBody').innerHTML = month.fullText || '<p>Full text not available for this period.</p>';
  document.getElementById('fullTextOverlay').classList.add('active');
}

function closeFullText(e) {
  if (e.target === document.getElementById('fullTextOverlay')) {
    document.getElementById('fullTextOverlay').classList.remove('active');
  }
}

// ─── MODAL ───────────────────────────────────────────────────────
function openModal(monthKey, topicId) {
  const month = DATA[monthKey];
  const cell  = month[topicId];
  const topic = TOPICS.find(t => t.id === topicId);
  const s     = STATUS[cell.status] || STATUS.flat;

  document.getElementById('modalPeriod').textContent = month.label;
  document.getElementById('modalTopic').textContent  = topic.icon + ' ' + topic.name;

  const badge = document.getElementById('modalBadge');
  badge.textContent = escHtml(cell.tag);
  badge.className   = 'modal-badge ' + cell.status;

  const ul = document.getElementById('modalBullets');
  ul.innerHTML = cell.bullets.map(b => `<li>${b}</li>`).join('');

  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('active');
    document.getElementById('fullTextOverlay').classList.remove('active');
  }
});

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────────
render();
